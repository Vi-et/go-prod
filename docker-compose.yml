version: '3.8'

services:
  api:
    build: .
    ports:
      - "4000:4000"
    environment:
      - ENV=production
    depends_on:
      db-primary:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

  db-primary:
    image: bitnami/postgresql:latest
    environment:
      - POSTGRESQL_USERNAME=greenlight
      - POSTGRESQL_PASSWORD=pa55word
      - POSTGRESQL_DATABASE=greenlight
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_SHARED_BUFFERS=1GB
      - POSTGRESQL_MAX_CONNECTIONS=1000
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    ports:
      - "5432:5432"
    volumes:
      - postgres_master_data:/bitnami/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U greenlight -d greenlight" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  db-replica-1:
    image: bitnami/postgresql:latest
    depends_on:
      - db-primary
    environment:
      - POSTGRESQL_MASTER_HOST=db-primary
      - POSTGRESQL_MASTER_PORT_NUMBER=5432
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_USERNAME=greenlight
      - POSTGRESQL_PASSWORD=pa55word
      - POSTGRESQL_DATABASE=greenlight
      - POSTGRESQL_SHARED_BUFFERS=1GB
      - POSTGRESQL_MAX_CONNECTIONS=1000
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
    ports:
      - "5433:5432"
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "6379:6379"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 600M

volumes:
  postgres_master_data:

networks:
  app-network:
