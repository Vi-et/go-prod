version: '3.8'

services:
  api:
    build: .
    ports:
      - "4000:4000"
    environment:
      - ENV=production
    depends_on:
      db-primary:
        condition: service_healthy
    networks:
      - app-network

  db-primary:
    image: bitnami/postgresql:latest
    environment:
      - POSTGRESQL_USERNAME=greenlight
      - POSTGRESQL_PASSWORD=pa55word
      - POSTGRESQL_DATABASE=greenlight
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_master_data:/bitnami/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U greenlight -d greenlight" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  db-replica-1:
    image: bitnami/postgresql:latest
    depends_on:
      - db-primary
    environment:
      - POSTGRESQL_MASTER_HOST=db-primary
      - POSTGRESQL_MASTER_PORT_NUMBER=5432
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_USERNAME=greenlight
      - POSTGRESQL_PASSWORD=pa55word
      - POSTGRESQL_DATABASE=greenlight
    ports:
      - "5433:5432"
    networks:
      - app-network

  db-replica-2:
    image: bitnami/postgresql:latest
    depends_on:
      - db-primary
    environment:
      - POSTGRESQL_MASTER_HOST=db-primary
      - POSTGRESQL_MASTER_PORT_NUMBER=5432
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_USERNAME=greenlight
      - POSTGRESQL_PASSWORD=pa55word
      - POSTGRESQL_DATABASE=greenlight
    ports:
      - "5434:5432"
    networks:
      - app-network

  db-replica-3:
    image: bitnami/postgresql:latest
    depends_on:
      - db-primary
    environment:
      - POSTGRESQL_MASTER_HOST=db-primary
      - POSTGRESQL_MASTER_PORT_NUMBER=5432
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_USERNAME=greenlight
      - POSTGRESQL_PASSWORD=pa55word
      - POSTGRESQL_DATABASE=greenlight
    ports:
      - "5435:5432"
    networks:
      - app-network

volumes:
  postgres_master_data:


networks:
  app-network:
